<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어바웃피싱 선주 모바일 — 전체 화면 종류</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink-1:#191919; --ink-2:#333; --ink-3:#888; --ink-4:#BCBCBC;
  --bg:#FAFAFB; --bg-soft:#F5F6F8; --line:#EEEEEE; --line-2:#E8E8E8;
  --blue:#3182F6; --blue-tint:#EBF1FF; --red:#FF5050; --green:#10B981; --orange:#C96A00; --purple:#6433DF;
  --sans:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
html,body{
  background:var(--bg); font-family:var(--sans); color:var(--ink-1);
  letter-spacing:-0.018em; -webkit-font-smoothing:antialiased; min-height:100vh;
}
.page-hd{
  position:sticky; top:0; z-index:50; background:rgba(255,255,255,.92); backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--line); padding:14px 32px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.page-hd-tag{
  font-family:var(--mono); font-weight:700; font-size:10px; letter-spacing:.18em;
  color:#fff; background:var(--ink-1); padding:4px 8px; border-radius:4px;
}
.page-hd-ttl{font-weight:800; font-size:18px; letter-spacing:-.03em;}
.page-hd-sub{font-size:12px; color:var(--ink-3);}
.spacer{flex:1;}
.back-btn{
  padding:9px 16px; background:var(--ink-1); color:#fff; border-radius:9999px;
  font-weight:700; font-size:12px; text-decoration:none;
  display:inline-flex; align-items:center; gap:6px;
}
.back-btn:hover{opacity:.86;}

.container{max-width:1480px; margin:0 auto; padding:24px 24px 80px;}

.row{
  display:flex; gap:24px; padding:20px; margin-bottom:20px;
  background:#fff; border-radius:14px; border:1px solid var(--line-2);
  box-shadow:0 1px 2px rgba(17,17,17,.04);
  align-items:flex-start;
}
.row-phone{flex-shrink:0; width:414px;}
.row-info{flex:1; min-width:0;}

/* phone-shell(414×910)이 iframe 안에 그대로 표시되도록 wrap의 padding 제거 */
.phone-frame-wrap{
  width:414px; height:910px; position:relative;
  border-radius:52px; overflow:hidden;
  box-shadow:0 12px 32px rgba(0,0,0,.18);
  background:#0e0e0e;
}
.phone-frame-wrap iframe{
  width:100%; height:100%; border:0; background:#0e0e0e; display:block;
}
.row-info-hd{
  display:flex; align-items:center; gap:10px; padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:14px;
  flex-wrap:wrap;
}
.code-badge{
  display:inline-flex; align-items:center; justify-content:center; min-width:42px; height:26px; padding:0 10px;
  background:var(--ink-1); color:#fff; border-radius:5px;
  font-family:var(--mono); font-weight:800; font-size:11px; letter-spacing:.05em;
}
.code-badge.s{background:var(--ink-1);}
.code-badge.m{background:var(--blue);}
.code-badge.c{background:var(--red);}
.code-badge.new{background:var(--green);}
.row-ttl{font-weight:800; font-size:17px; letter-spacing:-.4px;}
.row-sub{font-size:12px; color:var(--ink-3);}
.row-ttl-block{flex:1; min-width:0;}
.spec-link{
  font-size:11px; font-weight:700; color:var(--blue); text-decoration:none;
  padding:5px 10px; border:1px solid var(--blue); border-radius:6px;
}
.spec-link:hover{background:var(--blue-tint);}

.policy-section{margin-bottom:18px;}
.policy-title{
  font-size:13px; font-weight:800; color:var(--ink-1); letter-spacing:-.3px; margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}
.policy-title::before{
  content:""; width:3px; height:14px; background:var(--blue); border-radius:2px;
}
.policy-table{
  width:100%; border-collapse:collapse; font-size:12px; line-height:1.55;
  border:1px solid var(--line-2); border-radius:8px; overflow:hidden;
}
.policy-table th{
  background:var(--bg-soft); color:#444; font-weight:700; font-size:11px;
  padding:8px 10px; border-bottom:1px solid var(--line-2); text-align:left; letter-spacing:-.2px;
}
.policy-table td{
  border-bottom:1px solid var(--line); padding:9px 10px; vertical-align:top; color:var(--ink-2);
}
.policy-table tr:last-child td{border-bottom:0;}
.policy-table .col-elem{font-weight:700; color:var(--ink-1); background:#FAFAFB; white-space:nowrap;}
.policy-table .col-cond{color:#666; font-size:11px; white-space:nowrap;}
.policy-table .sp-pt{display:block; margin-bottom:5px;}
.policy-table .sp-pt:last-child{margin-bottom:0;}
.policy-table .sp-pt::before{content:"·"; margin-right:5px; color:#888; font-weight:700;}
.policy-table .hl{background:var(--blue-tint); color:var(--blue); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.policy-table .hl-r{background:#FFEEEE; color:var(--red); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.policy-table .hl-o{background:#FFF6E0; color:var(--orange); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.policy-table .tag-t,.policy-table .tag-db{display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:700; background:#FFF6E0; color:var(--orange); margin-left:4px;}
.policy-table .tag-db{background:#FFEEEE; color:var(--red);}
.policy-table .chip-cell{display:flex; align-items:flex-start; gap:4px; margin-bottom:4px; flex-wrap:wrap;}
.policy-table .chip-cell:last-child{margin-bottom:0;}
.policy-table .chip{flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; padding:2px 5px; border-radius:3px; font-size:10px; font-weight:800; font-family:var(--mono);}
.policy-table .chip-T{background:#FFFDE8; color:#7A6000; border:1px solid #FCD34D;}
.policy-table .chip-C{background:#FFEEEE; color:var(--red); border:1px solid #FCA5A5;}
.policy-table .chip-A{background:#FFF6E0; color:var(--orange); border:1px solid #FFE580;}
.policy-table .chip-msg{font-size:11px; color:#444;}
.policy-table .chip-type-tag{display:inline-block; font-size:9px; font-weight:700; padding:0 4px; border-radius:2px; background:var(--ink-1); color:#fff; margin-right:4px;}

/* ── Comment Section ── */
.comment-wrap{
  border-top:1px solid var(--line); margin-top:18px; padding-top:16px;
}
.comment-hd{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.comment-hd-left{display:flex; align-items:center; gap:8px;}
.comment-icon{width:16px; height:16px; stroke:var(--ink-2);}
.comment-hd-ttl{font-size:13px; font-weight:800; color:var(--ink-1);}
.cc-count{
  min-width:20px; height:20px; padding:0 6px; border-radius:10px;
  background:var(--blue); color:#fff; font-size:11px; font-weight:800;
  display:inline-flex; align-items:center; justify-content:center;
}
.cc-count.zero{background:var(--ink-4);}
.comment-list{margin-bottom:12px;}
.comment-empty{
  text-align:center; color:var(--ink-3); font-size:12px; padding:20px;
  background:var(--bg-soft); border-radius:8px;
}
.comment-item{
  background:var(--bg-soft); border-left:3px solid var(--blue); padding:10px 12px;
  border-radius:6px; margin-bottom:8px;
}
.comment-item-hd{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
.comment-avatar{
  width:28px; height:28px; border-radius:50%; color:#fff;
  font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#667eea99,#764ba2);
}
.comment-info{flex:1;}
.comment-author{font-size:12px; font-weight:700;}
.comment-role-ts{display:flex; gap:6px; font-size:10px; align-items:center;}
.comment-role{padding:1px 5px; border-radius:3px; background:var(--blue-tint); color:var(--blue); font-weight:700;}
.comment-ts{color:var(--ink-3);}
.comment-text{font-size:12px; line-height:1.6; color:var(--ink-2); white-space:pre-wrap; word-break:break-word;}
.comment-form{
  background:#fff; border:1px solid var(--line-2); border-radius:8px; padding:10px;
}
.comment-form-top{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.comment-avatar-inp{
  width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.comment-name-sel{
  flex:1; padding:6px 10px; border:1px solid var(--line-2); border-radius:6px;
  font-family:inherit; font-size:12px; background:#fff; cursor:pointer;
}
.comment-input{
  width:100%; min-height:60px; padding:8px 10px; border:1px solid var(--line); border-radius:6px;
  font-family:inherit; font-size:12px; resize:vertical; line-height:1.5;
}
.comment-input:focus{outline:0; border-color:var(--blue);}
.comment-form-footer{
  display:flex; justify-content:space-between; align-items:center; margin-top:8px;
}
.comment-char{font-size:10px; color:var(--ink-3);}
.comment-submit{
  padding:7px 14px; background:var(--blue); color:#fff; border:0; border-radius:6px;
  font-weight:700; font-size:12px; cursor:pointer; display:inline-flex; align-items:center; gap:5px;
}
.comment-submit:hover{opacity:.9;}

/* Reload phone btn */
.phone-act{
  display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:8px;
}
.phone-act-lbl{font-size:11px; color:var(--ink-3); letter-spacing:-.2px;}
.phone-reload{
  padding:5px 10px; background:#fff; color:var(--ink-2); border:1px solid var(--line-2);
  border-radius:6px; font-weight:700; font-size:11px; cursor:pointer;
}
.phone-reload:hover{background:var(--bg-soft);}

/* Loading */
.policy-loading{
  padding:30px; text-align:center; color:var(--ink-3); font-size:12px;
  background:var(--bg-soft); border-radius:8px;
}
@media (max-width:1120px){
  .row{flex-direction:column;}
  .row-phone{width:100%; max-width:414px; margin:0 auto;}
}

/* ── 추가 섹션 (알림 레퍼런스, DB 정합성) ── */
.extras-section{
  background:#fff; border:1px solid var(--line-2); border-radius:14px;
  margin-bottom:20px; padding:24px 28px;
  box-shadow:0 1px 2px rgba(17,17,17,.04);
}
.extras-hd{
  display:flex; align-items:center; gap:12px; padding-bottom:14px; border-bottom:1px solid var(--line); margin-bottom:18px;
}
.extras-num{
  display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px;
  background:var(--ink-1); color:#fff; border-radius:8px;
  font-family:var(--mono); font-weight:800; font-size:13px;
}
.extras-ttl{font-weight:800; font-size:18px; letter-spacing:-.4px;}
.extras-sub{font-size:12px; color:var(--ink-3);}
.extras-ttl-block{flex:1; min-width:0;}
.ref-section{padding:0;}
.ref-title{font-size:15px; font-weight:800; color:var(--ink-1); margin-bottom:14px; letter-spacing:-.3px;}
.ref-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;}
.ref-block{border:1.5px solid var(--line); border-radius:10px; overflow:hidden; background:#fff;}
.ref-head{padding:8px 14px; color:#fff; font-weight:800; font-size:13px; letter-spacing:-.2px;}
.ref-table{width:100%; border-collapse:collapse; font-size:11px; line-height:1.5;}
.ref-table th{background:var(--bg-soft); color:#444; font-weight:700; font-size:10.5px; padding:6px 8px; border-bottom:1px solid var(--line); text-align:left;}
.ref-table td{border-bottom:1px solid var(--line); padding:6px 8px; vertical-align:top; color:var(--ink-2); font-size:10.5px;}
.ref-table tr:last-child td{border-bottom:0;}
.ref-table .rc{font-family:var(--mono); font-weight:800; font-size:11px;}
.ref-table .rmsg{font-family:var(--mono); font-size:10.5px; color:#3182F6;}
.ref-table .ok-g{color:#10B981; text-align:center; font-weight:700;}
.ref-table .ok-r{color:#888; text-align:center; font-size:10px;}
.extras-section .sp-table{width:100%; border-collapse:collapse; font-size:11px; line-height:1.55;}
.extras-section .sp-table th{background:var(--bg-soft); color:#444; font-weight:700; font-size:10.5px; padding:8px 10px; border-bottom:1px solid var(--line-2); text-align:left;}
.extras-section .sp-table td{border-bottom:1px solid var(--line); padding:9px 10px; vertical-align:top; font-size:11px; color:var(--ink-2);}
.extras-section .sp-table .td-elem{font-weight:700; color:var(--ink-1); background:#FAFAFB; white-space:nowrap;}
.extras-section .sp-table .td-cond{color:#666; font-size:10.5px;}
.extras-section .sp-pt{display:block; margin-bottom:5px;}
.extras-section .sp-pt::before{content:"·"; margin-right:5px; color:#888; font-weight:700;}
.extras-section .hl{background:var(--blue-tint); color:var(--blue); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.extras-section .hl-r{background:#FFEEEE; color:var(--red); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.extras-section .hl-o{background:#FFF6E0; color:var(--orange); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10.5px; font-weight:700;}
.extras-section .add-row-btn{display:none;}
@media (max-width:880px){ .ref-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div class="page-hd">
  <span class="page-hd-tag">ALL SCREENS</span>
  <div>
    <div class="page-hd-ttl">어바웃피싱 선주 모바일 — 전체 화면 종류</div>
    <div class="page-hd-sub" id="hd-count">— 개 화면 · 1행 = 1프로토타입 + 정책 + 코멘트</div>
  </div>
  <div class="spacer"></div>
  <a class="back-btn" href="index.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    프로토타입으로
  </a>
</div>

<div class="container" id="rows-container"></div>

<!-- ── 추가 섹션: 알림 레퍼런스 + DB/API 정합성 ── -->
<div class="container" id="extras-wrap"></div>

<script>

2월)로 초기화되고 선택된 날짜는 빈 배열입니다.</span><span class=\"sp-pt\">선박이 미선택이면 진입 차단 → A14 Alert: \"선박을 먼저 선택해 주세요.\"</span></td>\n<td style=\"min-width:110px;\"><div class=\"chip-cell\"><span class=\"chip chip-A\">A 14</span><span class=\"chip-msg\"><span class=\"chip-type-tag chip-type-alert\">Alert</span>\"선박을 먼저 선택해 주세요.\"</span></div></td>\n</tr><tr>\n<td class=\"td-elem\">마스터 요약 박스</td>\n<td class=\"td-cond\">진입 시</td>\n<td><span class=\"sp-pt\">선택된 마스터 상품의 <span class=\"hl\">name</span>·<span class=\"hl\">releaseWeek</span>·<span class=\"hl\">sReleaseTime</span>~<span class=\"hl\">eReleaseTime</span>·<span class=\"hl\">maxPeople</span>(좌석)·<span class=\"hl\">adultRate</span>(대인)를 readonly로 표시합니다.</span><span class=\"sp-pt\">박스 클릭 시 동작 없음(편집은 출조종류 수정 M6에서). 데이터는 모달이 열려 있는 동안 master 상태와 동기화 됩니다.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">월 네비게이션 ‹ ›</td>\n<td class=\"td-cond\">클릭</td>\n<td><span class=\"sp-pt\">월 단위로 이동합니다. 12월→1월 이동 시 연도(<span class=\"hl\">calYear</span>) 자동 증가/감소.</span><span class=\"sp-pt\">월 이동 후에도 이미 선택된 날짜 배열(<span class=\"hl\">selected</span>)은 그대로 유지됩니다.</span><span class=\"sp-pt\">과거 월로의 이동 제한은 없음(과거에 등록할 일은 없지만 시연 편의상 허용). <span class=\"tag-t\">정책 후속 결정</span></span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">날짜 셀 (활성 가능)</td>\n<td class=\"td-cond\">클릭</td>\n<td><span class=\"sp-pt\">아래 모든 조건을 만족하는 날짜는 선택 가능 상태로 표시(흰색 배경 + 라인):<br/>① 마스터 운영기간 안 (<span class=\"hl\">sReleaseDt</span> ≤ MMDD ≤ <span class=\"hl\">eReleaseDt</span>)<br/>② 마스터 운영요일에 포함 (<span class=\"hl\">releaseWeek</span>)<br/>③ 해당 마스터의 일자별 상품이 아직 없음 (<span class=\"hl\">!bpi where date=X and masterProductId=M</span>)</span><span class=\"sp-pt\">클릭 시 selected 배열에 추가/제거 토글 → 선택 상태(파란 솔리드 + 흰 글씨)로 즉시 반영.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">날짜 셀 (이미 등록됨)</td>\n<td class=\"td-cond\">자동</td>\n<td><span class=\"sp-pt\">해당 마스터의 일자별 상품이 이미 존재하는 날짜(<span class=\"hl\">bpi.masterProductId === master.id &amp;&amp; bpi.date === d</span>)는 연한 파랑 배경 + 파랑 보더 + 하단 도트 표시.</span><span class=\"sp-pt\">클릭 비활성(cursor:not-allowed). 토스트(T12) \"이미 등록된 날짜입니다.\"는 표시하지 않고 정적으로 안내만 합니다.</span><span class=\"sp-pt\">중복 등록을 원하는 경우 일자별상품 탭의 해당 카드에서 [개별수정/복사]로 처리 (M4).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">날짜 셀 (휴무·범위 외)</td>\n<td class=\"td-cond\">자동</td>\n<td><span class=\"sp-pt\">운영요일에 포함되지 않거나 운영기간을 벗어난 날짜는 회색 배경 + cursor:not-allowed.</span><span class=\"sp-pt\">클릭 무시(상태 변경 없음).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">[이번 달 운영요일 전체]</td>\n<td class=\"td-cond\">클릭</td>\n<td><span class=\"sp-pt\">현재 표시 중인 월의 모든 \"선택 가능\"(able) 셀을 selected에 일괄 추가합니다.</span><span class=\"sp-pt\">이미 등록된 날짜·휴무일·범위 외 날짜는 제외 → 사용자 의도와 안전한 선택만 진행.</span><span class=\"sp-pt\">다른 월의 기존 선택은 보존됩니다 (월을 옮기며 누적 선택 가능).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">[이번 달 초기화]</td>\n<td class=\"td-cond\">클릭</td>\n<td><span class=\"sp-pt\">selected 배열에서 현재 월(<span class=\"hl\">YYYY-MM</span>)에 해당하는 날짜만 일괄 제거합니다.</span><span class=\"sp-pt\">다른 월의 선택은 영향을 받지 않습니다.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">선택 카운터</td>\n<td class=\"td-cond\">자동</td>\n<td><span class=\"sp-pt\">선택된 날짜 개수를 우측 상단에 실시간 표시 (N개). 0건이면 회색, 1건 이상이면 파란색·굵게.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">[N개 등록] CTA</td>\n<td class=\"td-cond\">클릭 (N ≥ 1)</td>\n<td><span class=\"sp-pt\">selected 배열을 오름차순 정렬 후 onSave(dates)로 전달 → 부모(<span class=\"hl\">ProductListScreen</span>)에서 마스터 속성을 상속한 새 bpi 레코드 N개를 일괄 생성합니다.</span><span class=\"sp-pt\">상속 필드: <span class=\"hl\">bpiName</span>=master.name, <span class=\"hl\">fishSpecies</span>, <span class=\"hl\">bpiQty</span>=boat.people(선박 정원 우선) 또는 master.maxPeople, <span class=\"hl\">bpiSReleaseTime</span>·<span class=\"hl\">bpiEReleaseTime</span>·<span class=\"hl\">bpiReleaseDay</span>, <span class=\"hl\">bpiAdultRate</span>·<span class=\"hl\">bpiKidsRate</span>·요금 옵션 일체.</span><span class=\"sp-pt\"><span class=\"hl\">bpiSReleaseDt</span>는 선택 날짜(YYMMDD), <span class=\"hl\">bpiEReleaseDt</span>는 master.releaseDay='N'(익일)이면 다음날, 'T'(당일)이면 같은 날.</span><span class=\"sp-pt\">주말요금: 마스터의 <span class=\"hl\">isWeekendRate</span>=true이고 선택일이 토/일이면 <span class=\"hl\">bpiIsWeekendRate</span>=true로 인스턴스화.</span><span class=\"sp-pt\">생성 완료 후 모달 닫고 Toast(T12) \"N개 날짜에 일자별 상품이 등록되었습니다\" 표시. 일자별상품 탭에 즉시 반영.</span></td>\n<td style=\"min-width:110px;\"><div class=\"chip-cell\"><span class=\"chip chip-T\">T 12</span><span class=\"chip-msg\"><span class=\"chip-type-tag chip-type-toast\">Toast</span>\"N개 날짜에 일자별 상품이 등록되었습니다\"</span></div></td>\n</tr><tr>\n<td class=\"td-elem\">[N개 등록] CTA</td>\n<td class=\"td-cond\">클릭 (N = 0)</td>\n<td><span class=\"sp-pt\">버튼 라벨이 \"날짜 선택\"으로 회색 비활성 상태. 클릭해도 동작하지 않음 (onSave 미호출).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">[취소] · ✕</td>\n<td class=\"td-cond\">클릭</td>\n<td><span class=\"sp-pt\">selected 배열 폐기, 모달 즉시 닫음. 생성된 bpi 없음.</span><span class=\"sp-pt\">선택이 1건 이상인 상태에서 ✕ 누른 경우 별도 확인 팝업 없음(파괴적 동작 아님). <span class=\"tag-t\">추후 정책 결정</span></span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">선박 변경 영향</td>\n<td class=\"td-cond\">진입 후 선박 전환</td>\n<td><span class=\"sp-pt\">상품관리 메인에서 선박을 바꾸면 마스터 목록(<span class=\"hl\">masterProducts where boatIdx=선박</span>)이 변경됨.</span><span class=\"sp-pt\">현재 열려 있는 BulkDailyRegisterModal의 master는 진입 시 스냅샷. 선박 변경은 모달을 닫고 다시 열어야 반영.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">DB 처리</td>\n<td class=\"td-cond\">CTA 클릭 후</td>\n<td><span class=\"sp-pt\">N개의 bpi INSERT (트랜잭션). 1건이라도 실패 시 ROLLBACK 후 토스트(T13) \"등록 중 오류가 발생했습니다.\" → 모달 유지. <span class=\"tag-db\">[DB] 미구현</span></span><span class=\"sp-pt\">중복 키 충돌(<span class=\"hl\">UNIQUE(masterProductId, date)</span>) 대비 → 사전 검증으로 차단(이미 등록됨 상태 처리).</span></td>\n<td style=\"min-width:110px;\"><div class=\"chip-cell\"><span class=\"chip chip-T\">T 13</span><span class=\"chip-msg\"><span class=\"chip-type-tag chip-type-toast\">Toast</span>\"등록 중 오류가 발생했습니다.\"</span></div></td>\n</tr><tr>\n<td class=\"td-elem\">좌석(<span class=\"hl\">bpiQty</span>) 결정</td>\n<td class=\"td-cond\">자동 (인스턴스화)</td>\n<td><span class=\"sp-pt\">우선순위: ① 현재 선택 선박의 정원(<span class=\"hl\">boat.people</span>) → ② 마스터 최대 인원(<span class=\"hl\">master.maxPeople</span>) → ③ 기본 11석.</span><span class=\"sp-pt\">근거: 한 선박에는 보통 한 마스터가 묶이며, 실제 판매 좌석은 선박의 물리 정원이 기준. 마스터의 maxPeople은 \"상품 정책상 최대\"로 폴백.</span><span class=\"sp-pt\">예약 후 좌석 조정은 M1 인원조정에서. 일자별 등록 시점에는 기본값만 결정.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">요금 인스턴스화 정책</td>\n<td class=\"td-cond\">자동 (날짜별)</td>\n<td><span class=\"sp-pt\">마스터에서 상속: <span class=\"hl\">bpiAdultRate</span>=master.adultRate, <span class=\"hl\">bpiAdultWeekendRate</span>=master.adultWeekendRate, <span class=\"hl\">bpiKidsRate</span>·<span class=\"hl\">bpiKidsWeekendRate</span> 동일.</span><span class=\"sp-pt\">주말요금 자동 적용 조건: master.<span class=\"hl\">isWeekendRate</span>=true AND 선택일의 요일이 토(6) 또는 일(0)이면 <span class=\"hl\">bpiIsWeekendRate</span>=true로 인스턴스화. 그 외 false.</span><span class=\"sp-pt\">소인 요금: master.<span class=\"hl\">isKidsRate</span>=true면 그대로 활성, false면 인스턴스의 kidsRate도 0/0으로 강제.</span><span class=\"sp-pt\">상품수수료: <span class=\"hl\">bpiProductsFee</span>=master.productsFee 그대로 복제. 정산 단계에서 적용.</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">익일 출조 (<span class=\"hl\">releaseDay</span>='N')</td>\n<td class=\"td-cond\">자동 (날짜별)</td>\n<td><span class=\"sp-pt\">master.releaseDay='N'(익일)인 경우 <span class=\"hl\">bpiSReleaseDt</span>는 선택일, <span class=\"hl\">bpiEReleaseDt</span>는 선택일+1일 (예: 2026-03-04 출항 → 2026-03-05 입항).</span><span class=\"sp-pt\">월말 처리: 2026-02-28(N) 선택 시 <span class=\"hl\">bpiEReleaseDt</span>=2026-03-01. JS Date 객체로 자동 처리 (윤년·월말 모두 대응).</span><span class=\"sp-pt\">시간: 출항 <span class=\"hl\">sReleaseTime</span> 20:00 / 입항 <span class=\"hl\">eReleaseTime</span> 05:00 (다음날 시각으로 해석).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">노출·예약 초기 상태</td>\n<td class=\"td-cond\">신규 인스턴스 생성</td>\n<td><span class=\"sp-pt\">신규 bpi의 <span class=\"hl\">bpiIsDisplay</span>=true (즉시 고객 앱에 노출). <span class=\"hl\">bpiIsException</span>=false. <span class=\"hl\">sold</span>=0 (예약 없음).</span><span class=\"sp-pt\">노출을 OFF 상태로 등록하고 싶다면 → 등록 후 일자별 카드의 노출 토글(S2-B)에서 끄기. 일괄 등록 모달은 노출 옵션을 별도로 제공하지 않음. <span class=\"tag-t\">옵션 후속 검토</span></span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">권한·역할</td>\n<td class=\"td-cond\">진입 시</td>\n<td><span class=\"sp-pt\">선주(<span class=\"hl\">role=owner</span>) 및 위임 받은 직원(<span class=\"hl\">role=staff</span>) 모두 접근 가능. 선장(<span class=\"hl\">role=captain</span>)은 캡틴 앱 사용 — 본 모달 미노출.</span><span class=\"sp-pt\">DB INSERT 시 <span class=\"hl\">createdBy</span>=현재 사용자 user_id, <span class=\"hl\">createdAt</span>=now() 자동 기록. <span class=\"tag-db\">audit log [DB] 미구현</span></span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">동시성</td>\n<td class=\"td-cond\">멀티 사용자 동시 등록</td>\n<td><span class=\"sp-pt\">다른 사용자가 같은 마스터·날짜에 이미 등록한 경우 → UNIQUE(masterProductId, date) 충돌. 트랜잭션 ROLLBACK 후 어떤 날짜가 충돌인지 안내 토스트(T14) \"N개 중 M개는 이미 등록되어 있어 X건만 등록되었습니다.\" <span class=\"tag-t\">미구현</span></span><span class=\"sp-pt\">사전 차단: 모달 진입 시 서버에서 existing dates를 받아 클라이언트 캐시. 모달 열려있는 동안에는 폴링 안 함 — 충돌은 INSERT 단계에서만 검출.</span></td>\n<td style=\"min-width:110px;\"><div class=\"chip-cell\"><span class=\"chip chip-T\">T 14</span><span class=\"chip-msg\"><span class=\"chip-type-tag chip-type-toast\">Toast</span>\"N개 중 M개는 이미 등록되어 있어 X건만 등록되었습니다.\"</span></div></td>\n</tr><tr>\n<td class=\"td-elem\">하위 화면 영향</td>\n<td class=\"td-cond\">등록 완료 후</td>\n<td><span class=\"sp-pt\">일자별상품 탭(S2): 신규 카드 N개가 해당 날짜 그룹에 즉시 추가. 현황 요약(노출/예약/잔여)도 즉시 재계산.</span><span class=\"sp-pt\">출조종류 카드(S4): \"출조일정 N건\" 카운트가 +N 증가.</span><span class=\"sp-pt\">홈 화면(S0): 이번 주 예약 캘린더에 신규 날짜의 점(dot)이 표시.</span><span class=\"sp-pt\">정산: 예약이 들어오기 전까지는 정산 데이터 영향 없음.</span><span class=\"sp-pt\">고객 앱: bpiIsDisplay=true이므로 고객 측 출조 캘린더에 즉시 노출 (실시간 또는 캐시 만료 후).</span></td>\n<td style=\"min-width:110px;\"></td>\n</tr><tr>\n<td class=\"td-elem\">에지 케이스</td>\n<td class=\"td-cond\">특수 조건</td>\n<td><span class=\"sp-pt\"><b>운영기간 경계</b>: master.<span class=\"hl\">sReleaseDt</span>=0101, <span class=\"hl\">eReleaseDt</span>=1231 인 경우 1년 어떤 날짜든 가능. 0601~0831 같이 짧은 기간 마스터는 해당 월 외에서는 선택 가능 셀이 0개 → 안내 메시지 표시.</span><span class=\"sp-pt\"><b>운영요일 0개</b>: master.releaseWeek가 빈 배열인 경우 → 어떤 날짜도 선택 불가. 진입 시 안내: \"이 출조종류는 운영요일이 설정되지 않아 일자별 등록이 불가합니다. 출조종류 수정에서 요일을 먼저 설정해 주세요.\"</span><span class=\"sp-pt\"><b>과거 날짜</b>: 오늘 이전 날짜도 선택 가능. 운영상 과거 예약은 의미 없으나 데이터 마이그레이션·테스트 케이스 작성용으로 허용.</span><span class=\"sp-pt\"><b>잠금 기간</b>: 출항 24시간 이내 신규 등록 시 경고 토스트(T15) \"출항 임박일은 예약 노출이 늦을 수 있습니다.\" <span class=\"tag-t\">미구현</span></span></td>\n<td style=\"min-width:110px;\"><div class=\"chip-cell\"><span class=\"chip chip-T\">T 15</span><span class=\"chip-msg\"><span class=\"chip-type-tag chip-type-toast\">Toast</span>\"출항 임박일은 예약 노출이 늦을 수 있습니다.\"</span></div></td>\n</tr></tbody></table>"};

// ── 정책 주입: 임베드 데이터 우선, 없으면 fetch 시도 ──
function loadPolicies(){
  SCREENS.forEach(function(s){
    var html = POLICY_DATA && POLICY_DATA[s.spec];
    var target = document.getElementById('policy-' + s.id);
    if(!target) return;
    if(html && html.length > 0){
      target.innerHTML = html;
      var tbl = target.querySelector('table');
      if(tbl) tbl.classList.add('policy-table');
      target.querySelectorAll('.td-elem').forEach(function(td){ td.classList.add('col-elem'); });
      target.querySelectorAll('.td-cond').forEach(function(td){ td.classList.add('col-cond'); });
    } else {
      target.innerHTML = '<div class="policy-loading">spec-'+s.spec+' 정책 데이터 없음</div>';
    }
  });
}
function loadPoliciesViaFetch(){
  fetch('index.html').then(function(r){ return r.text(); }).then(function(html){
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    SCREENS.forEach(function(s){
      var spec = doc.getElementById('spec-' + s.spec);
      var target = document.getElementById('policy-' + s.id);
      if(!target) return;
      if(!spec){
        target.innerHTML = '<div class="policy-loading">spec-'+s.spec+' 섹션을 찾을 수 없습니다. index.html에 정의되어 있나요?</div>';
        return;
      }
      var tableWrap = spec.querySelector('.spec-table-wrap');
      if(!tableWrap){
        target.innerHTML = '<div class="policy-loading">정책표 없음</div>';
        return;
      }
      // 행 추가 버튼 제거
      var ab = tableWrap.querySelector('.add-row-btn');
      if(ab) ab.remove();
      var table = tableWrap.querySelector('table');
      if(!table){
        target.innerHTML = '<div class="policy-loading">테이블 없음</div>';
        return;
      }
      // class 추가
      table.classList.add('policy-table');
      // 첫 행이 헤더인지 확인 — th 사용
      target.innerHTML = '';
      target.appendChild(table.cloneNode(true));
      // td-elem / td-cond class 매핑
      var firstRow = target.querySelector('tr');
      if(firstRow){
        var ths = firstRow.querySelectorAll('th');
        if(ths.length === 0){
          // 첫 행이 td 헤더인 경우 → 그대로 두고 col-* class 적용
        }
      }
      target.querySelectorAll('.td-elem').forEach(function(td){ td.classList.add('col-elem'); });
      target.querySelectorAll('.td-cond').forEach(function(td){ td.classList.add('col-cond'); });
    });
  }).catch(function(err){
    console.warn('index.html fetch 실패:', err);
    SCREENS.forEach(function(s){
      var target = document.getElementById('policy-' + s.id);
      if(target) target.innerHTML = '<div class="policy-loading">index.html을 불러올 수 없습니다 (CORS 또는 파일 경로 문제). 같은 폴더에서 열어주세요.</div>';
    });
  });
}

// ── 코멘트 시스템 (localStorage 공유 — sb_comments_<id>) ──
function getComments(id){
  try { return JSON.parse(localStorage.getItem('sb_comments_' + id) || '[]'); }
  catch(e) { return []; }
}
function saveComments(id, arr){
  localStorage.setItem('sb_comments_' + id, JSON.stringify(arr));
}
function updateAvatarLocal(id){
  var sel = document.getElementById('csel-' + id);
  var av = document.getElementById('cav-' + id);
  if(!sel || !av) return;
  var role = ROLE_LABELS[sel.value] || '';
  var meta = ROLE_META[role] || {color:'#aaa', init:'?'};
  av.textContent = (sel.value || '?').charAt(0);
  av.style.background = 'linear-gradient(135deg,' + meta.color + 'aa,' + meta.color + ')';
}
function updateCharCount(id){
  var inp = document.getElementById('cin-' + id);
  var cc = document.getElementById('cch-' + id);
  if(inp && cc) cc.textContent = inp.value.length + ' / 500';
}
function renderComments(id){
  var arr = getComments(id);
  var list = document.getElementById('cl-' + id);
  var badge = document.getElementById('cc-' + id);
  if(badge){
    badge.textContent = arr.length;
    badge.className = 'cc-count' + (arr.length === 0 ? ' zero' : '');
  }
  if(!list) return;
  if(arr.length === 0){
    list.innerHTML = '<div class="comment-empty">아직 코멘트가 없습니다. 첫 번째 의견을 남겨보세요!</div>';
    return;
  }
  var h = '';
  for(var i=0;i<arr.length;i++){
    var c = arr[i];
    var meta = ROLE_META[c.role] || {color:'#aaa', bg:'#f0f0f0'};
    var init = (c.author || '?').charAt(0);
    var safe = String(c.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    h += '<div class="comment-item" style="border-left-color:'+meta.color+';">'+
      '<div class="comment-item-hd">'+
        '<div class="comment-avatar" style="background:linear-gradient(135deg,'+meta.color+'99,'+meta.color+');">'+init+'</div>'+
        '<div class="comment-info">'+
          '<div class="comment-author">'+c.author+'</div>'+
          '<div class="comment-role-ts">'+
            '<span class="comment-role" style="background:'+meta.bg+';color:'+meta.color+';">'+c.role+'</span>'+
            '<span class="comment-ts">'+c.ts+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="comment-text">'+safe+'</div>'+
    '</div>';
  }
  list.innerHTML = h;
}
function addCommentLocal(id){
  var sel = document.getElementById('csel-' + id);
  var inp = document.getElementById('cin-' + id);
  if(!sel || !inp) return;
  var author = sel.value;
  var text = inp.value.trim();
  if(!author){ alert('작성자를 선택해주세요.'); return; }
  if(!text){ alert('코멘트를 입력해주세요.'); return; }
  if(text.length > 500){ alert('500자 이내로 입력해주세요.'); return; }
  var role = ROLE_LABELS[author] || '';
  var now = new Date();
  var ts = (now.getMonth()+1)+'/'+now.getDate()+' '+
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var arr = getComments(id);
  arr.push({id:Date.now(), author:author, role:role, text:text, ts:ts});
  saveComments(id, arr);
  inp.value = '';
  updateCharCount(id);
  var av = document.getElementById('cav-'+id);
  if(av){ av.textContent='?'; av.style.background='linear-gradient(135deg,#667eea,#764ba2)'; }
  renderComments(id);
}

// ── 이벤트 위임 ──
function bindEvents(){
  document.addEventListener('click', function(e){
    var sub = e.target.closest('.comment-submit');
    if(sub){ addCommentLocal(sub.getAttribute('data-id')); return; }
    var rel = e.target.closest('.phone-reload');
    if(rel){
      var id = rel.getAttribute('data-id');
      var f = document.getElementById('pf-'+id);
      if(f){ var src=f.src; f.src=''; setTimeout(function(){f.src=src;},50); }
      return;
    }
  });
  document.addEventListener('input', function(e){
    if(e.target.classList && e.target.classList.contains('comment-input')){
      var id = e.target.id.replace('cin-','');
      updateCharCount(id);
    }
  });
  document.addEventListener('change', function(e){
    if(e.target.classList && e.target.classList.contains('comment-name-sel')){
      var id = e.target.id.replace('csel-','');
      updateAvatarLocal(id);
    }
  });
  // 다른 탭에서 코멘트 변경 시 동기화
  window.addEventListener('storage', function(e){
    if(e.key && e.key.indexOf('sb_comments_')===0){
      var id = e.key.replace('sb_comments_','');
      renderComments(id);
    }
  });
}
